<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Inter+Tight:wght@300;400;600&family=IBM+Plex+Mono:wght@300;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 728px; height: 90px; overflow: hidden; background: #0d1017; }

  .banner {
    width: 728px; height: 90px;
    background: linear-gradient(to right, #0d1017, #11141d);
    position: relative; overflow: hidden;
    display: flex; align-items: center;
  }

  /* Left purple accent bar */
  .accent-bar {
    width: 4px; height: 90px; flex-shrink: 0;
    background: linear-gradient(to bottom, #219ebc, #6B3FE0);
  }

  /* Brand block */
  .left {
    padding: 0 18px; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 3px;
  }
  .brand-name {
    font-family: 'Sora', sans-serif; font-weight: 600; font-size: 13px;
    color: #fff; white-space: nowrap; letter-spacing: 0.01em;
  }
  .brand-since {
    font-family: 'IBM Plex Mono', monospace; font-weight: 300; font-size: 8px;
    color: rgba(255,255,255,0.35); white-space: nowrap; letter-spacing: 0.08em;
  }

  /* Vertical separators */
  .sep {
    width: 1px; height: 44px; flex-shrink: 0;
    background: linear-gradient(to bottom, transparent, rgba(141,89,255,0.4), transparent);
  }

  /* Center */
  .center {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; padding: 0 28px;
  }
  .center-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 85% at 50% 50%, rgba(141,89,255,0.1) 0%, transparent 70%);
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%, 100% { opacity: .6 } 50% { opacity: 1 } }
  .center-text {
    font-family: 'Inter Tight', sans-serif; font-weight: 400; font-size: 14px;
    color: rgba(255,255,255,0.9); white-space: nowrap;
    position: relative; z-index: 1; letter-spacing: 0.01em;
  }

  /* Right CTA */
  .right {
    padding: 0 20px; flex-shrink: 0;
    display: flex; flex-direction: column; align-items: flex-end; gap: 5px;
  }
  .cta-btn {
    font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 11.5px;
    color: #fff;
    background: linear-gradient(135deg, #219ebc 0%, #7040E8 100%);
    border-radius: 20px; padding: 6px 16px; white-space: nowrap;
    box-shadow: 0 2px 14px rgba(141,89,255,0.4);
    cursor: pointer; border: none;
  }
  .url {
    font-family: 'IBM Plex Mono', monospace; font-weight: 300; font-size: 8px;
    color: rgba(255,255,255,0.3); letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="accent-bar"></div>

  <div class="left">
    <div class="brand-name">Rightway Systems</div>
    <div class="brand-since">EST. 2010 · LAHORE, PK</div>
  </div>

  <div class="sep"></div>

  <div class="center">
    <div class="center-glow"></div>
    <div class="center-text">Enterprise ERP &amp; ZATCA Solutions — Pakistan &amp; Gulf</div>
  </div>

  <div class="sep"></div>

  <div class="right">
    <div class="cta-btn">Learn More →</div>
    <div class="url">rightapps.net</div>
  </div>
</div>
</body>
</html>
