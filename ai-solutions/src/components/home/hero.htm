<!-- hero section  -->
<section
  class="relative overflow-hidden pt-34 sm:pt-36 md:pt-40 lg:pt-44 xl:pt-50"
  aria-labelledby="hero-heading"
>
  <div class="main-container relative z-4">
    <div class="space-y-[55px]">
      <div class="space-y-10 md:space-y-14">
        <div class="space-y-3 text-center">
          <h1
            class="font-sora text-sora-heading-3 md:text-sora-heading-2 lg:text-sora-heading-1 mx-auto w-full max-w-[1136px] max-md:leading-[110%]"
            data-opai-split-text
          >
            <span class="inline-flex items-center justify-center gap-x-2 font-normal text-white/90">
              Solutions
              <button
                class="bg-red/10 modal-action group relative my-auto inline-block h-14 w-[102px] cursor-pointer overflow-hidden rounded-full border-5 border-white/3 md:h-[66px]"
                aria-label="Play video about Rightway Systems"
                type="button"
                data-video-url="https://www.youtube.com/embed/LuKAeNC8e3c?si=dNprxE8hkadUeDvf"
              >
                <img
                  src="./images/opai-img-96.png"
                  alt="Video thumbnail showing AI solutions in action"
                  class="size-full object-cover transition-transform duration-500 ease-in-out group-hover:scale-140 group-hover:rotate-10"
                  loading="eager"
                />
                <span
                  class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"
                  aria-hidden="true"
                >
                  <Component src="src/components/shared/icon/play.htm" class="fill-white" />
                </span>
              </button>
            </span>
            <span class="text-white/30">
              built for real impact
            </span>
          </h1>
          <p
            class="font-inter-tight text-tagline-2 mx-auto w-full max-w-[450px] font-normal text-white/50"
            aria-describedby="hero-heading"
            data-opai-split-text
            data-delay="0.3"
            data-line-delay="0.1"
          >
            Pakistan's trusted software house for ERP, ZATCA compliance, AI automation &amp; custom software development — serving 100+ enterprise clients across Pakistan, Saudi Arabia &amp; UAE.
          </p>
        </div>

        <div
          class="flex items-center justify-center gap-x-6.5 lg:gap-x-15"
          aria-label="Action buttons"
        >
          <div data-opai-animate data-delay="0.9" data-duration="0.7">
            <Component
              href="./pricing.html"
              src="src/components/home/hero-button.htm"
              button-text="Start a Project"
            />
          </div>

          <button
            data-opai-animate
            data-delay="1"
            data-duration="0.7"
            class="bg-background-7 border-stroke-1/11 group modal-action relative z-20 flex size-[52px] cursor-pointer items-center justify-center rounded-full border"
            aria-label="Play demo video"
            type="button"
            data-video-url="https://www.youtube.com/embed/BTMjD7_evjE?si=HXnYR-0JdkmV_kwM"
          >
            <span
              class="flex size-6 items-center justify-center gap-x-1 overflow-hidden"
              aria-hidden="true"
            >
              <Component
                src="src/components/shared/icon/play.htm"
                class="fill-background-6 h-[18px] w-[14px] shrink-0 -translate-x-4 scale-95 transition-all duration-400 ease-out group-hover:translate-x-3 group-hover:scale-100"
              />
              <Component
                src="src/components/shared/icon/play.htm"
                class="fill-background-6 h-[18px] w-[14px] shrink-0 -translate-x-[7px] scale-100 transition-all duration-400 ease-out group-hover:translate-x-3 group-hover:scale-75"
              />
            </span>
            <span
              class="absolute top-1/2 left-1/2 z-10 size-17 -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/20 opacity-100"
              aria-hidden="true"
            ></span>
            <span
              class="absolute top-1/2 left-1/2 z-10 size-21 -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/10 opacity-100"
              aria-hidden="true"
            ></span>
            <span
              class="absolute top-1/2 left-1/2 z-10 size-25 -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/5 opacity-100"
              aria-hidden="true"
            ></span>
          </button>
        </div>
      </div>
      <figure
        data-opai-animate
        data-delay="1.1"
        data-duration="0.7"
        data-instant
        class="relative z-10 mx-auto h-[300px] max-w-[1223px] md:h-[400px] lg:h-[573px]"
      >
        <img
          src="./images/opai-img-95.png"
          alt="AI-powered business solutions dashboard showing analytics and automation tools"
          loading="eager"
          width="1223"
          height="573"
          class="size-[120%] object-cover md:size-full"
        />
      </figure>
    </div>
  </div>
  <Component src="src/components/home/hero-video.htm" />

  <div
    class="to-background-7 pointer-events-none absolute -bottom-10 left-0 z-20 h-[184px] w-full bg-gradient-to-b from-transparent from-[10.09%] to-[89.05%] select-none"
  ></div>
  <div
    class="to-background-7 pointer-events-none absolute -bottom-12 left-0 z-19 h-[104px] w-full bg-gradient-to-b from-transparent from-[10.09%] to-[69.05%] select-none"
  ></div>
  <div
    class="to-background-7 pointer-events-none absolute -bottom-2 left-0 z-18 h-[40px] w-full bg-gradient-to-b from-transparent from-[10.09%] to-[55.05%] select-none"
  ></div>
  <div
    class="absolute left-0 z-20 hidden h-[200px] w-full"
  >
    <img src="./images/blend.png" alt="Rightway Systems enterprise software interface"
                  loading="lazy" />
  </div>
</section>
