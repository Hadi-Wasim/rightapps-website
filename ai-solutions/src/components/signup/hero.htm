<section class="pt-34 pb-12 2xl:pt-44">
  <div class="main-container">
    <div
      data-opai-animate
      data-delay="0.4"
      class="mx-auto w-full rounded-lg bg-[url('/images/gradient/opai-37.jpg')] bg-cover bg-center bg-no-repeat p-4 bg-blend-lighten lg:p-20 xl:p-28 2xl:p-39"
    >
      <div class="mb-10 space-y-3 text-center xl:mb-14">
        <h1
          data-opai-split-text
          class="xl:text-sora-heading-2 lg:text-sora-heading-3 text-sora-heading-4 inline-block font-normal text-white/90"
        >
          Create your <span class="text-white/30">account</span>
        </h1>
        <p
          data-opai-split-text
          data-delay="0.2"
          data-line-delay="0.1"
          class="text-tagline-2 mx-auto max-w-xs font-normal text-white/60"
        >
          Join Rightway Systems and explore AI-driven solutions tailored to your goals.
        </p>
      </div>
      <div class="flex items-stretch justify-center gap-y-12 xl:gap-x-8 2xl:gap-x-12">
        <div
          class="bg-background-6 w-full max-w-full flex-1 rounded-lg p-6 sm:p-8 md:p-11 lg:min-h-[577px] lg:max-w-[460px]"
        >
          <form>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label for="name" class="text-tagline-2 block font-normal text-white/90"
                >Your name</label
              >
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter your name"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 block w-full rounded-full border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label for="email" class="text-tagline-2 block font-normal text-white/90"
                >Your email</label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 block w-full rounded-full border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label for="password" class="text-tagline-2 block font-normal text-white/90"
                >Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                placeholder="At least 8 characters"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 block w-full rounded-full border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>
            <fieldset class="mb-4 space-y-2 md:mb-6">
              <label for="confirm-password" class="text-tagline-2 block font-normal text-white/90"
                >Confirm password</label
              >
              <input
                type="password"
                id="confirm-password"
                name="confirm-password"
                placeholder="Re-enter your password"
                class="border-stroke-1/11 text-tagline-3 placeholder:text-tagline-3 bg-background-5 block w-full rounded-full border px-[18px] py-2.5 font-normal text-white/90 placeholder:text-white/60 focus:outline-none"
              />
            </fieldset>
            <fieldset class="mt-6 mb-4 flex items-center justify-between gap-x-5 md:mt-8 md:mb-6">
              <label class="flex cursor-pointer items-center gap-1.5">
                <input
                  type="checkbox"
                  name="terms"
                  required=""
                  class="peer sr-only"
                  aria-label="I agree to the terms and conditions"
                />
                <span
                  class="border-stroke-1/11 peer-checked:border-primary-500 relative size-5 cursor-pointer rounded-full border after:absolute after:top-1/2 after:left-1/2 after:size-3 after:-translate-x-1/2 after:-translate-y-1/2 after:rounded-full after:bg-white/50 after:opacity-0 peer-checked:after:opacity-100"
                ></span>
                <span class="text-tagline-3 font-medium text-white/90 select-none">
                  I agree to the <a href="#" class="text-white/60 underline underline-offset-2">terms and conditions</a>
                </span>
              </label>
              <div>
                <a
                  href="./login.html"
                  class="text-tagline-3 block flex-1 font-normal text-white/60 underline underline-offset-2"
                  >Already have an account? Login</a
                >
              </div>
            </fieldset>
            <div class="button-split-text-wrapper block">
              <button
                type="submit"
                class="group bg-background-7 hover:border-stroke-3 relative flex max-h-12 w-full cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-full border border-transparent px-6 py-[13px] transition-all duration-300 ease-in-out"
              >
                <div class="relative overflow-hidden">
                  <div class="h-5.5">
                    <div
                      class="text-background-5 font-ibm-plex-mono button-split-upper-text text-tagline-2 block leading-[1.4] font-medium text-nowrap"
                    >
                      Sign up
                    </div>
                  </div>
                  <div class="absolute h-5.5">
                    <div
                      class="text-background-5 font-ibm-plex-mono button-split-lower-text text-tagline-2 block leading-[1.4] font-medium text-nowrap"
                    >
                      Sign up
                    </div>
                  </div>
                </div>

                <div
                  class="relative mt-[2px] flex size-6 items-center justify-center overflow-hidden"
                >
                  <!-- circle  -->
                  <span
                    class="stroke-background-6 ease-custom-ease-1 absolute size-[18px] translate-x-0 stroke-[1.5px] transition-all duration-500 group-hover:translate-x-6"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 18 18"
                      fill="none"
                    >
                      <path
                        d="M6.75 13.5L11.25 9L6.75 4.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </span>

                  <!-- arrow   -->
                  <span
                    class="stroke-background-6 ease-custom-ease-1 absolute size-[18px] -translate-x-6 stroke-[1.5px] transition-all duration-500 group-hover:translate-x-0"
                  >
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 18 18"
                      fill="none"
                    >
                      <path
                        d="M6.75 13.5L11.25 9L6.75 4.5"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </span>
                </div>
              </button>
            </div>
          </form>
          <div class="py-6">
            <p
              class="text-tagline-4 relative px-2 text-center font-normal text-white/90 before:absolute before:top-1/2 before:left-[26%] before:block before:h-[1px] before:w-[43px] before:-translate-y-1/2 before:bg-[linear-gradient(270deg,rgba(210,223,240,0.40)_0%,rgba(210,223,240,0.00)_78.71%)] before:content-[''] after:absolute after:top-1/2 after:right-[26%] after:block after:h-[1px] after:w-[43px] after:-translate-y-1/2 after:rotate-180 after:bg-[linear-gradient(270deg,rgba(210,223,240,0.40)_0%,rgba(210,223,240,0.00)_78.71%)] after:content-[''] sm:before:left-[35%] sm:after:right-[35%]"
            >
              Or
            </p>
          </div>
          <div class="space-y-4 md:space-y-6">
            <button
              type="button"
              class="border-stroke-3/25 hover:bg-stroke-3/25 group flex w-full items-center justify-center gap-2 rounded-full border px-8 py-3 transition-all duration-300 ease-in-out"
            >
              <span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <path
                    d="M21.7541 12.2199C21.7541 11.4182 21.6878 10.8332 21.5441 10.2266H12.2031V13.8449H17.6861C17.5756 14.744 16.9786 16.0982 15.6521 17.0082L15.6335 17.1293L18.5869 19.3715L18.7915 19.3916C20.6708 17.6907 21.7541 15.1882 21.7541 12.2199Z"
                    fill="#4285F4"
                  />
                  <path
                    d="M12.2002 21.7514C14.8864 21.7514 17.1415 20.8847 18.7886 19.3897L15.6492 17.0063C14.8091 17.5805 13.6815 17.9813 12.2002 17.9813C9.56932 17.9813 7.33635 16.2805 6.54036 13.9297L6.42369 13.9394L3.35266 16.2686L3.3125 16.378C4.94853 19.563 8.30907 21.7514 12.2002 21.7514Z"
                    fill="#34A853"
                  />
                  <path
                    d="M6.53907 13.9306C6.32904 13.3239 6.20749 12.6739 6.20749 12.0023C6.20749 11.3305 6.32904 10.6806 6.52802 10.0739L6.52246 9.94471L3.41294 7.57812L3.3112 7.62555C2.63691 8.94723 2.25 10.4314 2.25 12.0023C2.25 13.5731 2.63691 15.0572 3.3112 16.3789L6.53907 13.9306Z"
                    fill="#FBBC05"
                  />
                  <path
                    d="M12.2003 6.01997C14.0685 6.01997 15.3286 6.8108 16.0472 7.47168L18.855 4.785C17.1306 3.21417 14.8865 2.25 12.2003 2.25C8.3091 2.25 4.94854 4.43832 3.3125 7.62329L6.52933 10.0717C7.33638 7.72083 9.56936 6.01997 12.2003 6.01997Z"
                    fill="#EB4335"
                  />
                </svg>
              </span>
              <span class="text-tagline-3 font-normal text-white/90">Continue with Google</span>
            </button>
            <button
              type="button"
              class="border-stroke-3/25 hover:bg-stroke-3/25 group flex w-full items-center justify-center gap-2 rounded-full border px-8 py-3 transition-all duration-300 ease-in-out"
            >
              <span>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                >
                  <path
                    d="M22.5 12.0642C22.5 6.22974 17.799 1.5 12 1.5C6.20101 1.5 1.5 6.22974 1.5 12.0642C1.5 17.337 5.33968 21.7075 10.3594 22.5V15.1179H7.69336V12.0642H10.3594V9.73675C10.3594 7.08911 11.927 5.62663 14.3254 5.62663C15.4738 5.62663 16.6758 5.83296 16.6758 5.83296V8.43274H15.3518C14.0475 8.43274 13.6406 9.24713 13.6406 10.0834V12.0642H16.5527L16.0872 15.1179H13.6406V22.5C18.6603 21.7075 22.5 17.337 22.5 12.0642Z"
                    fill="#0C63D4"
                  />
                </svg>
              </span>
              <span class="text-tagline-3 font-normal text-white/90">Continue with facebook</span>
            </button>
          </div>
        </div>
        <div class="hidden min-h-[577px] w-full max-w-[460px] flex-1 flex-col xl:flex">
          <figure class="block h-full overflow-hidden rounded-lg">
            <img src="./images/opai-img-472.jpg" alt="signup-hero" class="size-full object-cover"
                  loading="lazy" />
          </figure>
        </div>
      </div>
    </div>
  </div>
</section>
