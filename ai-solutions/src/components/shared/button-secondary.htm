<div class="{=$display-class} button-split-text-wrapper inline-block">
  <a
    href="{=$href}"
    class="group bg-background-6 hover:bg-background-4 border-stroke-3/18 {=$class} relative flex max-h-12 cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-full border px-6 py-[13px] transition-all duration-300 ease-in-out"
  >
    <div class="relative overflow-hidden">
      <div class="h-5.5">
        <div
          class="font-ibm-plex-mono text-tagline-2 button-split-upper-text block cursor-pointer leading-[1.4] font-medium text-nowrap text-white/90"
        >
          {=$button-text}
        </div>
      </div>
      <div class="absolute h-5.5">
        <div
          class="font-ibm-plex-mono text-tagline-2 button-split-lower-text block cursor-pointer leading-[1.4] font-medium text-nowrap text-white/90"
        >
          {=$button-text}
        </div>
      </div>
    </div>

    <div class="relative mt-[2px] flex size-6 items-center justify-center overflow-hidden">
      <!-- arrow  -->
      <span
        class="ease-custom-ease-1 absolute size-[18px] translate-x-0 stroke-white/90 stroke-[1.5px] transition-all duration-500 group-hover:translate-x-6"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
        >
          <path d="M6.75 13.5L11.25 9L6.75 4.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>

      <!-- arrow   -->
      <span
        class="ease-custom-ease-1 absolute size-[18px] -translate-x-6 stroke-white/90 stroke-[1.5px] transition-all duration-500 group-hover:translate-x-0"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 18 18"
          fill="none"
        >
          <path d="M6.75 13.5L11.25 9L6.75 4.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
    </div>
  </a>
</div>
